---
task-defaults:
    description: "symbolicator-cli toolchain build"
    attributes:
        local-toolchain: true
    worker-type: b-linux-docker-amd
    worker:
        max-run-time: 1800

symbolicator-cli:
    description: "symbolicator-cli from firefox profiler"
    treeherder:
        symbol: TL(symbolicator-cli)
    run:
        script: build-symbolicator-cli.sh
        toolchain-artifact: public/build/symbolicator-cli.tar.zst
    fetches:
        fetch:
            - firefox-profiler
        toolchain:
            - linux64-node
